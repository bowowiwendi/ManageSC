<style>
:root {
  --primary-color: #007bff;
  --secondary-color: #6c757d;
  --success-color: #28a745;
  --danger-color: #dc3545;
  --warning-color: #ffc107;
  --info-color: #17a2b8;
  --light-color: #f8f9fa;
  --dark-color: #343a40;
  --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  --border-radius: 8px;
  --box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

body {
  font-family: var(--font-family);
  background-color: #eef2f7;
  margin: 0;
  color: var(--dark-color);
}

.container {
  max-width: 1400px;
  margin: 1rem auto;
  padding: 1rem;
  background-color: #fff;
  border-radius: var(--border-radius);
  box-shadow: var(--box-shadow);
}

header {
  text-align: center;
  border-bottom: 2px solid var(--light-color);
  padding-bottom: 1rem;
  margin-bottom: 2rem;
}

header h1 {
  margin: 0;
  color: var(--primary-color);
}

/* --- BUTTONS --- */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--border-radius);
  cursor: pointer;
  font-size: 1rem;
  font-weight: bold;
  transition: background-color 0.3s, transform 0.2s;
  text-decoration: none;
  display: inline-block;
}

.btn:hover {
  transform: translateY(-2px);
  filter: brightness(110%);
}

.btn-primary { background-color: var(--primary-color); color: white; }
.btn-success { background-color: var(--success-color); color: white; }
.btn-danger { background-color: var(--danger-color); color: white; }
.btn-secondary { background-color: var(--secondary-color); color: white; }
.btn-warning { background-color: var(--warning-color); color: var(--dark-color); }
.btn-info { background-color: var(--info-color); color: white; }
.btn-renew { background-color: var(--info-color); color: white; }

.button-group { 
  margin-bottom: 1rem; 
  display: flex;
  gap: 10px;
}

/* --- PENAMBAHAN: STYLES UNTUK FILTER --- */
.filter-controls {
  background-color: var(--light-color);
  padding: 1rem;
  border-radius: var(--border-radius);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.filter-controls h3 {
  margin: 0;
  font-size: 1.1rem;
  color: var(--dark-color);
}

.form-group-inline {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.form-group-inline label {
  margin: 0;
  font-weight: normal;
}

/* --- TABLE --- */
.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1rem;
}

th, td {
  padding: 12px 15px;
  text-align: left;
  border-bottom: 1px solid #ddd;
}

thead {
  background-color: var(--primary-color);
  color: white;
}

tbody tr:nth-of-type(even) { background-color: var(--light-color); }
tbody tr:hover { background-color: #e2e6ea; }

.action-buttons { 
  white-space: nowrap; 
  display: flex;
  gap: 5px;
}

.action-buttons .btn {
  font-size: 0.9rem;
  padding: 8px 12px;
}

/* --- PENAMBAHAN: STYLES UNTUK PAGINATION --- */
.pagination-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 0;
  flex-wrap: wrap;
  gap: 1rem;
}

.pagination-info {
  font-size: 0.9rem;
  color: var(--secondary-color);
}

.pagination-controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.btn-page-number {
  padding: 8px 12px;
  font-size: 0.9rem;
  min-width: 40px;
}

.btn-page-number.active {
  background-color: var(--primary-color);
  color: white;
  cursor: default;
}

.btn-page-number.active:hover {
  transform: none;
  filter: none;
}

/* --- BADGES --- */
.badge {
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 0.8em;
  font-weight: bold;
  color: white;
}
.badge-limit { background-color: var(--warning-color); color: var(--dark-color); }
.badge-unli { background-color: var(--success-color); }

/* --- MODAL --- */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.5);
  animation: fadeIn 0.3s;
}

.modal-content {
  background-color: #fff;
  margin: 5% auto;
  padding: 2rem;
  border-radius: var(--border-radius);
  width: 90%;
  max-width: 500px;
  position: relative;
  animation: slideIn 0.3s;
}

.close-btn {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  color: #aaa;
}
.close-btn:hover {
  color: var(--dark-color);
}

.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
  font-family: var(--font-family);
}

.form-group input:disabled {
  background-color: #e9ecef;
  cursor: not-allowed;
}

.form-group small {
  font-size: 0.8em;
  color: #6c757d;
}

.form-actions {
  text-align: right;
  margin-top: 1.5rem;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

textarea {
  resize: vertical;
}

/* --- NOTIFICATION --- */
.notification {
  padding: 15px;
  margin: 15px 0;
  border-radius: var(--border-radius);
  display: none;
}
.notification.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.notification.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

/* --- SPINNER --- */
.spinner {
  border: 4px solid rgba(0, 0, 0, 0.1);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border-left-color: var(--primary-color);
  animation: spin 1s ease infinite;
  margin: 20px auto;
  display: none;
}

/* --- ANIMATIONS --- */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideIn {
  from { transform: translateY(-50px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* --- RESPONSIVE DESIGN --- */
@media screen and (max-width: 768px) {
  .container {
    padding: 0.5rem;
    margin: 0.5rem;
  }

  .button-group {
    flex-direction: column;
  }
  .button-group .btn {
    width: 100%;
    margin-bottom: 10px;
  }
  
  .filter-controls {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .pagination-wrapper {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  #data-table thead {
    display: none;
  }
  #data-table, #data-table tbody, #data-table tr, #data-table td {
    display: block;
    width: 100% !important;
  }
  
  #data-table tr {
    margin-bottom: 1rem;
    border: 1px solid #ccc;
    border-radius: var(--border-radius);
    padding: 10px;
    background-color: #fff;
    box-shadow: var(--box-shadow);
  }

  #data-table td {
    border: none;
    border-bottom: 1px solid #eee;
    position: relative;
    padding-left: 50%;
    text-align: left;
    white-space: normal;
  }
  
  #data-table td:before {
    content: attr(data-label);
    position: absolute;
    left: 10px;
    width: 45%;
    padding-right: 10px;
    font-weight: bold;
    text-align: left;
  }
  
  #data-table td:last-child {
    border-bottom: none;
    padding-left: 10px;
    text-align: center;
  }
  #data-table td:last-child:before {
    content: "Aksi:";
    position: static;
    width: auto;
    padding-right: 0;
    display: block;
    margin-bottom: 10px;
  }
}
</style>
